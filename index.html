<style>
body{
margin:0;
font-family:sans-serif;
background:#000;
color:#fff;
text-align:center;
overflow-x:hidden;
}

/* Background */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('bk.webp') center/cover no-repeat;
z-index:-1;
filter:brightness(0.5);
}

/* Neon border effect */
.bg::after{
content:"";
position:absolute;
top:0;left:0;right:0;bottom:0;
box-shadow:0 0 20px #00f, 0 0 40px #0ff inset;
animation:neon 2s infinite alternate;
}
@keyframes neon{
from{opacity:0.6;}
to{opacity:1;}
}

/* DP */
.dp{
width:110px;
height:110px;
border-radius:50%;
margin-top:20px;
border:3px solid #fff;
object-fit:cover;
}

/* Title */
h1{
margin:10px 0 5px;
font-size:26px;
}

/* Tagline */
.tagline{
font-size:20px;
opacity:0.8;
margin-bottom:10px;
}

/* Counter */
.counter{
font-size:18px;
margin:10px 0;
}

/* Countdown */
.timer{
color:#ff4444;
font-size:14px;
margin:10px 0;
}

/* Button */
.btn{
display:inline-flex;
align-items:center;
gap:10px;
padding:14px 22px;
background:#0088cc;
color:#fff;
text-decoration:none;
border-radius:30px;
font-size:16px;
font-weight:bold;
margin:15px auto;
animation:pulse 1.5s infinite;
}
.btn img{
width:20px;
}

/* Pulse animation */
@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

/* Text lines */
.info{
font-size:20px;
margin-top:20px;
}

Join My Telegram
</a>

<div class="info">IPL 2026 All Matches Free Reports</div>
<div class="info">T-20 world cup - 87% matches pass</div>

<script>
// Subscriber animation
let count = 29000;
const target = 29580;
const counter = document.getElementById("counter");

function updateCounter(){
if(count < target){
count += Math.floor(Math.random()*8)+1;
if(count > target) count = target;
counter.innerText = count + " subscribers";
setTimeout(updateCounter, 80);
}
}
updateCounter();

// Countdown timer + redirect
let time = 10;
const timer = document.getElementById("timer");

const countdown = setInterval(()=>{
time--;
timer.innerText = "Free joining ends in " + time + " seconds";

if(time <= 0){
clearInterval(countdown);
window.location.href = "https://telegram.me/+Rq7nsY1vZQw4ZDZl";
}
},1000);
</script>
